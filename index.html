        #bc-app-boot-loading {

          z-index: 2147483000;

          height: 44px;
          border: 3px solid #e2e8f0;
          border-top-color: #16a34a;
          border-radius: 50%;
          animation: bc-boot-spin 0.75s linear infinite;
        }
        @keyframes bc-boot-spin {
          to {
            transform: rotate(360deg);
          }
        }
        #bc-app-boot-loading p {
          margin: 1rem 0 0;
          font-size: 0.875rem;
          font-weight: 600;
          color: #475569;
        }
      </style>
      <div id="bc-app-boot-loading" role="status" aria-live="polite" aria-busy="true">
