<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookingCart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1888969771559868"
      crossorigin="anonymous"
    ></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SNTS0YPVSH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SNTS0YPVSH');
    </script>
    <script src="/js/shared-utils.js"></script>
    <script src="/js/auth.js" defer></script>
  </head>
  <body>
    <div id="root">
      <style>
        #bcl {
          position: fixed; inset: 0; z-index: 2147483000;
          background: #f8fafc;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
          overflow: hidden;
          transition: opacity 0.8s cubic-bezier(.4,0,.2,1);
        }
        #bcl.out { opacity: 0; pointer-events: none; }

        /* Subtle dot grid pattern */
        #bcl-stars {
          position: absolute; inset: 0;
          background-image:
            radial-gradient(1.5px 1.5px at 10% 12%, rgba(22,163,74,0.15) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 30% 6%,  rgba(22,163,74,0.1) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 52% 20%, rgba(22,163,74,0.12) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 72% 9%,  rgba(22,163,74,0.08) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 88% 25%, rgba(22,163,74,0.1) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 5%  45%, rgba(22,163,74,0.09) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 95% 50%, rgba(22,163,74,0.07) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 20% 75%, rgba(22,163,74,0.12) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 40% 85%, rgba(22,163,74,0.1) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 62% 78%, rgba(22,163,74,0.08) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 80% 90%, rgba(22,163,74,0.11) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 96% 82%, rgba(22,163,74,0.07) 0%, transparent 100%);
        }

        /* Soft green atmosphere bottom glow */
        #bcl-atmo {
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 260px;
          background: linear-gradient(to top, rgba(22,163,74,0.08) 0%, rgba(22,163,74,0.02) 50%, transparent 100%);
          pointer-events: none;
        }
        /* Radial center glow behind logo */
        #bcl-halo {
          position: absolute;
          width: 500px; height: 500px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(22,163,74,0.09) 0%, transparent 70%);
          pointer-events: none;
          animation: bcl-halo-pulse 3s ease-in-out infinite;
        }
        @keyframes bcl-halo-pulse {
          0%,100% { transform: scale(1); opacity: 1; }
          50%      { transform: scale(1.15); opacity: 0.7; }
        }

        /* ── Plane flyover ── */
        #bcl-runway {
          position: absolute;
          width: 100%; height: 0;
          top: 38%;
        }
        #bcl-plane {
          position: absolute;
          top: 0; transform: translateY(-50%);
          animation: bcl-fly 3s cubic-bezier(.25,.46,.45,.94) infinite;
          filter: drop-shadow(0 0 10px rgba(74,222,128,0.9)) drop-shadow(0 0 24px rgba(74,222,128,0.4));
        }
        @keyframes bcl-fly {
          0%   { left: -90px; opacity: 0; }
          6%   { opacity: 1; }
          93%  { opacity: 1; }
          100% { left: calc(100% + 90px); opacity: 0; }
        }

        /* Contrail behind plane */
        #bcl-contrail {
          position: absolute;
          top: 0; transform: translateY(-50%);
          height: 2px;
          border-radius: 999px;
          background: linear-gradient(to right, transparent 0%, rgba(74,222,128,0.55) 40%, rgba(74,222,128,0.15) 100%);
          animation: bcl-contrail-move 3s cubic-bezier(.25,.46,.45,.94) infinite;
          pointer-events: none;
        }
        @keyframes bcl-contrail-move {
          0%   { left: -300px; width: 0;    opacity: 0; }
          6%   { opacity: 1; }
          20%  { width: 140px; }
          50%  { width: 200px; }
          93%  { opacity: 0.6; }
          100% { left: calc(100% + 90px); width: 200px; opacity: 0; }
        }

        /* ── Center UI ── */
        #bcl-center {
          position: relative; z-index: 2;
          display: flex; flex-direction: column;
          align-items: center; text-align: center;
        }

        /* Logo badge */
        #bcl-badge {
          width: 76px; height: 76px;
          border-radius: 22px;
          background: linear-gradient(145deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
          display: flex; align-items: center; justify-content: center;
          margin-bottom: 30px;
          position: relative;
          animation: bcl-badge-glow 2.5s ease-in-out infinite;
        }
        #bcl-badge::before {
          content: '';
          position: absolute; inset: -1px;
          border-radius: 23px;
          background: linear-gradient(145deg, rgba(134,239,172,0.5), transparent 60%);
          z-index: -1;
        }
        @keyframes bcl-badge-glow {
          0%,100% { box-shadow: 0 4px 24px rgba(22,163,74,0.35), 0 12px 48px rgba(22,163,74,0.15), 0 2px 8px rgba(0,0,0,0.1); }
          50%      { box-shadow: 0 8px 36px rgba(22,163,74,0.5), 0 20px 64px rgba(22,163,74,0.25), 0 2px 8px rgba(0,0,0,0.1); }
        }
        #bcl-badge svg { width: 38px; height: 38px; }

        /* Wordmark — letters slide up */
        #bcl-wm {
          font-size: 36px; font-weight: 800;
          letter-spacing: -1.5px; line-height: 1;
          margin-bottom: 12px;
        }
        #bcl-wm .wh { color: #0f172a; }
        #bcl-wm .wg { color: #16a34a; }
        .bcl-c {
          display: inline-block;
          opacity: 0; transform: translateY(22px);
          animation: bcl-c-in 0.55s cubic-bezier(.16,1,.3,1) forwards;
        }
        @keyframes bcl-c-in {
          to { opacity: 1; transform: translateY(0); }
        }

        /* Tagline */
        #bcl-sub {
          font-size: 12px; font-weight: 600;
          color: #64748b;
          letter-spacing: 4px; text-transform: uppercase;
          margin-bottom: 44px;
          opacity: 0;
          animation: bcl-up 0.5s 1.1s ease forwards;
        }
        @keyframes bcl-up {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* Live status pill */
        #bcl-pill {
          display: inline-flex; align-items: center; gap: 8px;
          padding: 7px 18px;
          border-radius: 999px;
          background: #f1f5f9;
          border: 1px solid #e2e8f0;
          font-size: 12px; font-weight: 600;
          color: #64748b;
          letter-spacing: 0.2px;
          opacity: 0;
          animation: bcl-up 0.5s 1.4s ease forwards;
        }
        #bcl-dot {
          width: 7px; height: 7px; border-radius: 50%;
          background: #16a34a;
          flex-shrink: 0;
          animation: bcl-dot-beat 1.1s ease-in-out infinite;
        }
        @keyframes bcl-dot-beat {
          0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(22,163,74,0.5); }
          50%      { opacity: 0.5; transform: scale(0.75); box-shadow: 0 0 0 5px rgba(22,163,74,0); }
        }

        /* Bottom edge progress */
        #bcl-prog {
          position: absolute; bottom: 0; left: 0; right: 0;
          height: 3px;
          background: #e2e8f0;
        }
        #bcl-prog-fill {
          height: 100%; width: 0%;
          background: linear-gradient(90deg, #15803d, #22c55e, #86efac);
          transition: width 0.3s ease;
          box-shadow: 0 0 10px rgba(22,163,74,0.4);
        }

        /* Version tag bottom-right */
        #bcl-ver {
          position: absolute; bottom: 14px; right: 20px;
          font-size: 10px; font-weight: 600;
          color: #cbd5e1;
          letter-spacing: 1px;
        }
      </style>

      <div id="bcl" role="status" aria-live="polite" aria-busy="true">
        <div id="bcl-stars"></div>
        <div id="bcl-atmo"></div>
        <div id="bcl-halo"></div>

        <!-- Plane flyover -->
        <div id="bcl-runway">
          <div id="bcl-contrail"></div>
          <div id="bcl-plane">
            <svg width="52" height="22" viewBox="0 0 52 22" fill="none">
              <!-- Fuselage -->
              <path d="M2 11 Q14 11 20 5 L38 3 Q44 3 48 7 L50 9 Q52 10 50 11 L48 12 Q46 13 40 13 L22 11 Q16 11 12 15 L6 17 Z" fill="#4ade80"/>
              <!-- Wing -->
              <path d="M22 11 L30 3 L36 5 L26 13 Z" fill="#86efac" opacity="0.9"/>
              <!-- Tail fin -->
              <path d="M12 11 L8 5 L14 6 L16 11 Z" fill="#86efac" opacity="0.8"/>
              <!-- Engine glow -->
              <ellipse cx="42" cy="11" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)"/>
            </svg>
          </div>
        </div>

        <!-- Main content -->
        <div id="bcl-center">
          <div id="bcl-badge">
            <svg viewBox="0 0 38 38" fill="none">
              <path d="M32 17L22 7L19 10L24 17H5L6.5 19.5L24 22L19 29L22 32L32 22L34 19.5Z" fill="white"/>
              <path d="M32 17L22 7L19 10L24 17H5L6.5 19.5L24 22L19 29L22 32L32 22L34 19.5Z" fill="url(#bgrad)" opacity="0.3"/>
              <defs>
                <linearGradient id="bgrad" x1="5" y1="7" x2="34" y2="32">
                  <stop stop-color="#dcfce7"/>
                  <stop offset="1" stop-color="white"/>
                </linearGradient>
              </defs>
            </svg>
          </div>

          <div id="bcl-wm">
            <span class="wh">
              <span class="bcl-c" style="animation-delay:.08s">B</span><span class="bcl-c" style="animation-delay:.13s">O</span><span class="bcl-c" style="animation-delay:.18s">O</span><span class="bcl-c" style="animation-delay:.23s">K</span><span class="bcl-c" style="animation-delay:.28s">I</span><span class="bcl-c" style="animation-delay:.33s">N</span><span class="bcl-c" style="animation-delay:.38s">G</span>
            </span><span class="wg">
              <span class="bcl-c" style="animation-delay:.46s">C</span><span class="bcl-c" style="animation-delay:.51s">A</span><span class="bcl-c" style="animation-delay:.56s">R</span><span class="bcl-c" style="animation-delay:.61s">T</span>
            </span>
          </div>

          <div id="bcl-sub">Fly Smarter &nbsp;&bull;&nbsp; Book Faster</div>

          <div id="bcl-pill">
            <div id="bcl-dot"></div>
            <span id="bcl-status">Connecting to airlines…</span>
          </div>
        </div>

        <div id="bcl-prog"><div id="bcl-prog-fill"></div></div>
        <div id="bcl-ver">v2.0</div>
      </div>

      <script>
        (function(){
          var fill   = document.getElementById('bcl-prog-fill');
          var status = document.getElementById('bcl-status');
          var steps  = ['Fetching best fares…', 'Securing your route…', 'Almost there…'];
          var p = 0, si = 0;
          function tick(){
            p = Math.min(p + Math.random()*13 + 4, 90);
            if(fill) fill.style.width = p + '%';
            if(status && si < steps.length && p > (si + 1) * 27){
              status.textContent = steps[si++];
            }
          }
          var iv = setInterval(tick, 360);
          window.__bcLoaderDone = function(){
            clearInterval(iv);
            if(fill){ fill.style.transition = 'width 0.5s ease'; fill.style.width = '100%'; }
            if(status) status.textContent = 'Ready to fly!';
            setTimeout(function(){
              var el = document.getElementById('bcl');
              if(el){
                el.classList.add('out');
                setTimeout(function(){ if(el && el.parentNode) el.parentNode.removeChild(el); }, 900);
              }
            }, 400);
          };
        })();
      </script>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
